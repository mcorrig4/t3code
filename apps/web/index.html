<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="application-name" content="T3 Code" />
    <meta name="apple-mobile-web-app-title" content="T3 Code" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#161616" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#161616" />
    <link id="app-manifest" rel="manifest" href="/manifest.webmanifest" />
    <link id="app-favicon-ico" rel="icon" href="/favicon.ico" sizes="48x48" />
    <link id="app-favicon-32" rel="icon" href="/favicon-32x32.png" sizes="32x32" type="image/png" />
    <link id="app-favicon-16" rel="icon" href="/favicon-16x16.png" sizes="16x16" type="image/png" />
    <link id="app-apple-touch-icon" rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (() => {
        const LIGHT_BACKGROUND = "#ffffff";
        const DARK_BACKGROUND = "#161616";
        const themeColorMeta = document.querySelector('meta[name="theme-color"]');
        try {
          const storedTheme = window.localStorage.getItem("t3code:theme");
          const theme =
            storedTheme === "light" || storedTheme === "dark" || storedTheme === "system"
              ? storedTheme
              : "system";
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const isDark = theme === "dark" || (theme === "system" && prefersDark);
          document.documentElement.classList.toggle("dark", isDark);
          const chromeColor = isDark ? DARK_BACKGROUND : LIGHT_BACKGROUND;
          document.documentElement.style.backgroundColor = chromeColor;
          themeColorMeta?.setAttribute("content", chromeColor);
        } catch {
          document.documentElement.classList.add("dark");
          document.documentElement.style.backgroundColor = DARK_BACKGROUND;
          themeColorMeta?.setAttribute("content", DARK_BACKGROUND);
        }
      })();
    </script>
    <style>
      html,
      body,
      #root {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      body {
        background: #ffffff;
        color: #262626;
        font-family:
          "DM Sans",
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          system-ui,
          sans-serif;
      }

      html.dark body {
        background: #161616;
        color: #f5f5f5;
      }

      body {
        position: relative;
      }

      #boot-shell {
        position: fixed;
        inset: 0;
        z-index: 9999;
        display: flex;
        align-items: center;
        justify-content: center;
        background:
          radial-gradient(
            circle at top,
            var(--t3-loader-ambient-core, rgba(53, 87, 163, 0.3)),
            transparent 45%
          ),
          linear-gradient(
            180deg,
            var(--t3-boot-start, #0d1d38) 0%,
            var(--t3-boot-mid, #07101f) 58%,
            var(--t3-boot-end, #050c17) 100%
          );
        opacity: 1;
        transition:
          opacity 180ms ease,
          visibility 180ms ease;
      }

      #boot-shell[data-state="dismissed"] {
        opacity: 0;
        visibility: hidden;
      }

      #boot-shell-card {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        min-width: 160px;
        min-height: 160px;
        padding: 28px 32px;
        border: 1px solid color-mix(in srgb, var(--t3-loader-outline, #2563eb) 32%, white 16%);
        border-radius: 32px;
        background: linear-gradient(
          180deg,
          color-mix(in srgb, var(--t3-boot-mid, #07101f) 84%, white 8%) 0%,
          color-mix(in srgb, var(--t3-boot-end, #050c17) 88%, black 12%) 100%
        );
        box-shadow:
          0 22px 80px rgba(0, 0, 0, 0.38),
          inset 0 1px 0 color-mix(in srgb, var(--t3-loader-core-soft, #dbeafe) 12%, transparent);
        backdrop-filter: blur(18px);
      }

      #boot-shell-logo {
        width: 72px;
        height: 72px;
        object-fit: contain;
      }

      #boot-shell-wordmark {
        color: var(--t3-loader-core-strong, rgba(247, 250, 255, 0.92));
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.34em;
        text-transform: uppercase;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&display=swap"
      rel="stylesheet"
    />
    <!-- app-branding-vars -->
    <title>T3 Code (Alpha)</title>
  </head>
  <body>
    <div id="boot-shell" aria-hidden="true">
      <div id="boot-shell-card" aria-label="T3 Code splash screen">
        <img id="boot-shell-logo" src="/apple-touch-icon.png" alt="T3 Code" />
        <div id="boot-shell-wordmark">T3 Code</div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
